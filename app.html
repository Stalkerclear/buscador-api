<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Buscador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0f14; font-family: 'DM Sans', 'Segoe UI', sans-serif; }
    input::placeholder { color: #4b5563; }
    * { -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 0px; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
    @keyframes fadeInTag { from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)} }
    @keyframes spin { from{transform:rotate(0deg)}to{transform:rotate(360deg)} }
    .card-enter { animation: fadeInUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }
    .spin { display:inline-block; animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ⚠️ Troca pela URL da sua API no Render após o deploy
    const API_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:3000'
      : 'https://SUA-API.onrender.com';

    function ScoreBadge({ score }) {
      const configs = {
        5: { label: '🔥 Ótimo preço', color: '#ff6b35' },
        4: { label: '✨ Bom negócio', color: '#f5a623' },
        3: { label: '📦 Disponível',  color: '#6b7280' },
        2: { label: '💬 Consultar',   color: '#6b7280' },
      };
      const c = configs[score] || configs[3];
      return (
        <span style={{
          fontSize:'10px', fontWeight:'700', color:c.color,
          background:`${c.color}18`, padding:'2px 7px',
          borderRadius:'20px', border:`1px solid ${c.color}40`,
        }}>{c.label}</span>
      );
    }

    function ResultCard({ item, delay }) {
      const [imgErro, setImgErro] = useState(false);
      return (
        <div className="card-enter" style={{
          background:'#16181f', borderRadius:'16px',
          overflow:'hidden', border:'1px solid #ffffff0f',
          boxShadow:'0 4px 24px #00000040',
          animationDelay:`${delay}ms`,
        }}>
          {/* Foto */}
          <div style={{ position:'relative', height:'180px', overflow:'hidden', background:'#1e2028' }}>
            {item.foto && !imgErro ? (
              <img
                src={item.foto} alt={item.titulo}
                onError={() => setImgErro(true)}
                style={{ width:'100%', height:'100%', objectFit:'cover' }}
              />
            ) : (
              <div style={{
                width:'100%', height:'100%',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:'40px', opacity:0.3,
              }}>🏷️</div>
            )}
            <div style={{
              position:'absolute', inset:0,
              background:'linear-gradient(to bottom, transparent 40%, #16181fdd 100%)'
            }} />
            <div style={{
              position:'absolute', top:'10px', right:'10px',
              background:'#0008', backdropFilter:'blur(8px)',
              borderRadius:'8px', padding:'4px 8px',
              fontSize:'11px', color:'#fff', fontWeight:'600',
            }}>{item.fonte}</div>
            <div style={{ position:'absolute', bottom:'10px', left:'12px' }}>
              <ScoreBadge score={item.score} />
            </div>
          </div>

          {/* Info */}
          <div style={{ padding:'12px 14px 14px' }}>
            <div style={{
              fontSize:'15px', fontWeight:'700', color:'#f0f0f0',
              marginBottom:'6px', lineHeight:'1.3',
            }}>{item.titulo}</div>

            <div style={{
              fontSize:'22px', fontWeight:'800', color:'#ff8c42', marginBottom:'8px',
            }}>{item.precoFormatado}</div>

            <div style={{ fontSize:'12px', color:'#9ca3af', marginBottom:'12px' }}>
              📍 {item.distancia ? `${item.distancia} · ` : ''}{item.localidade}
            </div>

            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{
                fontSize:'11px', color:'#6b7280',
                background:'#ffffff08', padding:'3px 8px', borderRadius:'6px',
              }}>⚡ {item.tempo}</span>

              <a
                href={item.url}
                target="_blank"
                rel="noopener noreferrer"
                style={{
                  background:'linear-gradient(135deg,#ff8c42,#ffb347)',
                  border:'none', borderRadius:'8px',
                  padding:'7px 18px', fontSize:'12px',
                  color:'#000', fontWeight:'800',
                  textDecoration:'none', display:'inline-block',
                }}>
                Ver anúncio →
              </a>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [tela, setTela]               = useState('busca');
      const [termo, setTermo]             = useState('');
      const [cidade, setCidade]           = useState('');
      const [precoMax, setPrecoMax]       = useState('');
      const [fontesAtivas, setFontesAtivas] = useState(['Marketplace', 'Grupos Públicos']);
      const [buscando, setBuscando]       = useState('');
      const [resultados, setResultados]   = useState([]);
      const [erro, setErro]               = useState('');
      const [alertaAtivo, setAlertaAtivo] = useState(false);
      const [salvandoAlerta, setSalvandoAlerta] = useState(false);
      const [tagIndex, setTagIndex]       = useState(0);
      const inputRef = useRef(null);

      const opcoesFontes = ['Marketplace', 'Grupos Públicos', 'Meus Grupos'];
      const tudoSelecionado = fontesAtivas.length === opcoesFontes.length;
      const podeBuscar = termo.trim().length >= 2 && fontesAtivas.length > 0 && !buscando;

      const loadingTags = ['Marketplace', 'Grupos Públicos', 'Grupos Privados', 'Filtrando...'];

      useEffect(() => {
        if (tela === 'busca' && inputRef.current) inputRef.current.focus();
      }, [tela]);

      useEffect(() => {
        if (!buscando) return;
        const t = setInterval(() => setTagIndex(i => i + 1), 500);
        return () => clearInterval(t);
      }, [buscando]);

      function toggleFonte(fonte) {
        if (fonte === 'Tudo') {
          setFontesAtivas(tudoSelecionado ? [] : [...opcoesFontes]);
          return;
        }
        setFontesAtivas(prev =>
          prev.includes(fonte) ? prev.filter(f => f !== fonte) : [...prev, fonte]
        );
      }

      async function handleBuscar() {
        if (!podeBuscar) return;
        setErro('');
        setTagIndex(0);
        setBuscando(true);

        try {
          const res = await fetch(`${API_URL}/api/buscar`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              termo: termo.trim(),
              cidade: cidade.trim(),
              precoMax: precoMax ? parseInt(precoMax) : null,
              fontes: fontesAtivas,
            }),
          });

          const data = await res.json();

          if (!res.ok) {
            setErro(data.erro || 'Erro ao buscar');
            setBuscando(false);
            return;
          }

          setResultados(data.resultados);
          setAlertaAtivo(false);
          setTela('resultados');

        } catch (err) {
          setErro('Não foi possível conectar à API. Verifique o deploy.');
        } finally {
          setBuscando(false);
        }
      }

      async function handleAlerta() {
        // chatId fixo por enquanto — futuramente vem do login do Telegram
        const chatId = prompt('Seu chat ID do Telegram:\n(Mande /start pro @userinfobot pra descobrir)');
        if (!chatId) return;

        setSalvandoAlerta(true);
        try {
          const res = await fetch(`${API_URL}/api/alertas`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chatId,
              termo: termo.trim(),
              cidade: cidade.trim(),
              precoMax: precoMax ? parseInt(precoMax) : null,
              fontes: fontesAtivas,
            }),
          });

          const data = await res.json();
          if (res.ok) {
            setAlertaAtivo(true);
          } else {
            alert(data.erro || 'Erro ao salvar alerta');
          }
        } catch {
          alert('Erro ao conectar');
        } finally {
          setSalvandoAlerta(false);
        }
      }

      const inputStyle = {
        width:'100%', background:'#16181f',
        border:'1px solid #ffffff15', borderRadius:'14px',
        color:'#f0f0f0', fontSize:'16px', outline:'none',
      };

      return (
        <div style={{
          minHeight:'100vh', background:'#0d0f14', color:'#f0f0f0',
          maxWidth:'420px', margin:'0 auto', overflowX:'hidden',
        }}>
          {/* Glow */}
          <div style={{
            position:'fixed', top:'-120px', left:'50%', transform:'translateX(-50%)',
            width:'320px', height:'320px',
            background:'radial-gradient(circle,#ff8c4212 0%,transparent 70%)',
            pointerEvents:'none', zIndex:0,
          }} />

          {/* Header */}
          <div style={{
            padding:'20px 20px 0', position:'relative', zIndex:1,
            display:'flex', alignItems:'center', justifyContent:'space-between',
          }}>
            <div>
              <div style={{
                fontSize:'22px', fontWeight:'800', letterSpacing:'-0.5px',
                background:'linear-gradient(135deg,#ff8c42,#ffb347)',
                WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
              }}>Buscador</div>
              <div style={{ fontSize:'11px', color:'#6b7280', marginTop:'1px' }}>
                Marketplace + Grupos de venda
              </div>
            </div>
            {tela === 'resultados' && (
              <button onClick={() => setTela('busca')} style={{
                background:'#ffffff10', border:'1px solid #ffffff15',
                borderRadius:'10px', padding:'8px 14px',
                color:'#9ca3af', fontSize:'13px', cursor:'pointer',
              }}>← Nova busca</button>
            )}
          </div>

          {/* ── TELA BUSCA ── */}
          {tela === 'busca' && (
            <div style={{ padding:'28px 20px 40px', position:'relative', zIndex:1 }}>
              <div style={{ marginBottom:'28px' }}>
                <div style={{
                  fontSize:'28px', fontWeight:'800',
                  lineHeight:'1.2', letterSpacing:'-0.5px', marginBottom:'8px',
                }}>
                  O que você está<br />
                  <span style={{
                    background:'linear-gradient(135deg,#ff8c42,#ffb347)',
                    WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
                  }}>procurando?</span>
                </div>
                <div style={{ fontSize:'14px', color:'#6b7280' }}>
                  Buscamos em todos os lugares de uma vez
                </div>
              </div>

              <div style={{ display:'flex', flexDirection:'column', gap:'12px' }}>

                <div style={{ position:'relative' }}>
                  <span style={{ position:'absolute', left:'14px', top:'50%', transform:'translateY(-50%)', fontSize:'18px' }}>🔍</span>
                  <input ref={inputRef} value={termo}
                    onChange={e => setTermo(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && handleBuscar()}
                    placeholder="Ex: Corsa, iPhone 11, PS5..."
                    style={{ ...inputStyle, padding:'16px 16px 16px 46px' }}
                  />
                </div>

                <div style={{ position:'relative' }}>
                  <span style={{ position:'absolute', left:'14px', top:'50%', transform:'translateY(-50%)', fontSize:'18px' }}>📍</span>
                  <input value={cidade} onChange={e => setCidade(e.target.value)}
                    placeholder="Cidade (qualquer cidade)"
                    style={{ ...inputStyle, padding:'16px 16px 16px 46px' }}
                  />
                </div>

                <div style={{ position:'relative' }}>
                  <span style={{ position:'absolute', left:'14px', top:'50%', transform:'translateY(-50%)', fontSize:'14px', color:'#6b7280', fontWeight:'700' }}>R$</span>
                  <input value={precoMax}
                    onChange={e => setPrecoMax(e.target.value.replace(/\D/g,''))}
                    placeholder="Preço máximo (opcional)"
                    style={{ ...inputStyle, padding:'16px 16px 16px 46px' }}
                  />
                </div>

                {/* Fontes multi-select */}
                <div>
                  <div style={{ fontSize:'12px', color:'#6b7280', marginBottom:'8px' }}>
                    Buscar em:{fontesAtivas.length === 0 && <span style={{ color:'#ef4444' }}> selecione ao menos uma</span>}
                  </div>
                  <div style={{ display:'flex', gap:'8px', flexWrap:'wrap' }}>
                    <button onClick={() => toggleFonte('Tudo')} style={{
                      padding:'7px 14px', borderRadius:'20px', cursor:'pointer',
                      border:`1px solid ${tudoSelecionado ? '#ff8c42' : '#ffffff15'}`,
                      background: tudoSelecionado ? '#ff8c4220' : 'transparent',
                      color: tudoSelecionado ? '#ff8c42' : '#6b7280',
                      fontSize:'12px', fontWeight: tudoSelecionado ? '700' : '400',
                    }}>{tudoSelecionado ? '✓ ' : ''}Tudo</button>

                    {opcoesFontes.map(f => {
                      const ativo = fontesAtivas.includes(f);
                      return (
                        <button key={f} onClick={() => toggleFonte(f)} style={{
                          padding:'7px 14px', borderRadius:'20px', cursor:'pointer',
                          border:`1px solid ${ativo ? '#ff8c42' : '#ffffff15'}`,
                          background: ativo ? '#ff8c4220' : 'transparent',
                          color: ativo ? '#ff8c42' : '#6b7280',
                          fontSize:'12px', fontWeight: ativo ? '700' : '400',
                          display:'flex', alignItems:'center', gap:'4px',
                        }}>
                          {ativo && <span style={{ fontSize:'10px' }}>✓</span>}
                          {f}
                          {f === 'Meus Grupos' && (
                            <span style={{ fontSize:'9px', background:'#ff8c42', color:'#000', padding:'1px 5px', borderRadius:'4px', fontWeight:'800' }}>PRO</span>
                          )}
                        </button>
                      );
                    })}
                  </div>
                </div>

                {erro && (
                  <div style={{
                    background:'#ef444415', border:'1px solid #ef444440',
                    borderRadius:'10px', padding:'10px 14px',
                    fontSize:'13px', color:'#ef4444',
                  }}>{erro}</div>
                )}

                <button onClick={handleBuscar} disabled={!podeBuscar} style={{
                  width:'100%', padding:'18px',
                  background: podeBuscar ? 'linear-gradient(135deg,#ff8c42,#ffb347)' : '#ffffff10',
                  border:'none', borderRadius:'14px',
                  color: podeBuscar ? '#000' : '#4b5563',
                  fontSize:'16px', fontWeight:'800', fontFamily:'inherit',
                  cursor: podeBuscar ? 'pointer' : 'not-allowed',
                  transition:'all 0.3s', marginTop:'4px',
                }}>
                  {buscando
                    ? <span><span className="spin">⏳</span> Buscando...</span>
                    : 'Buscar agora →'
                  }
                </button>

                {buscando && (
                  <div style={{ textAlign:'center' }}>
                    <div style={{ fontSize:'13px', color:'#6b7280', marginBottom:'10px', animation:'pulse 1s ease-in-out infinite' }}>
                      Varrendo Marketplace e grupos...
                    </div>
                    <div style={{ display:'flex', gap:'6px', justifyContent:'center', flexWrap:'wrap' }}>
                      {loadingTags.slice(0, tagIndex).map(tag => (
                        <span key={tag} style={{
                          fontSize:'10px', color:'#ff8c42',
                          background:'#ff8c4215', padding:'3px 8px',
                          borderRadius:'6px', border:'1px solid #ff8c4230',
                        }}>✓ {tag}</span>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ── TELA RESULTADOS ── */}
          {tela === 'resultados' && (
            <div style={{ padding:'16px 20px 60px', position:'relative', zIndex:1 }}>

              <div style={{
                background:'#16181f', borderRadius:'12px', padding:'12px 14px',
                marginBottom:'14px', border:'1px solid #ffffff0f',
                display:'flex', justifyContent:'space-between', alignItems:'center',
              }}>
                <div>
                  <div style={{ fontSize:'13px', fontWeight:'700', color:'#f0f0f0' }}>
                    "{termo}"{cidade ? ` · ${cidade}` : ' · Todo Brasil'}
                  </div>
                  <div style={{ fontSize:'11px', color:'#6b7280', marginTop:'2px' }}>
                    {resultados.length} anúncio{resultados.length !== 1 ? 's' : ''} encontrado{resultados.length !== 1 ? 's' : ''}
                  </div>
                </div>
                <div style={{
                  fontSize:'10px', color:'#ff8c42', background:'#ff8c4215',
                  padding:'4px 8px', borderRadius:'8px', fontWeight:'700',
                  textAlign:'right', maxWidth:'130px', lineHeight:'1.4',
                }}>
                  {tudoSelecionado ? 'Tudo' : fontesAtivas.join(' + ')}
                </div>
              </div>

              {/* Botão de alerta */}
              <button
                onClick={handleAlerta}
                disabled={salvandoAlerta || alertaAtivo}
                style={{
                  width:'100%', padding:'14px',
                  background: alertaAtivo ? 'linear-gradient(135deg,#ff8c4225,#ffb34715)' : '#16181f',
                  border:`1px solid ${alertaAtivo ? '#ff8c42' : '#ffffff15'}`,
                  borderRadius:'12px', marginBottom:'16px',
                  color: alertaAtivo ? '#ff8c42' : '#9ca3af',
                  fontSize:'14px', fontWeight:'700', fontFamily:'inherit',
                  cursor: alertaAtivo ? 'default' : 'pointer',
                  transition:'all 0.3s',
                  display:'flex', alignItems:'center', justifyContent:'center', gap:'8px',
                }}>
                {salvandoAlerta
                  ? '⏳ Salvando...'
                  : alertaAtivo
                  ? '🔔 Avisando quando aparecer novidade'
                  : '🔕 Ativar alerta para essa busca'
                }
              </button>

              {resultados.length === 0 ? (
                <div style={{
                  textAlign:'center', padding:'48px 20px',
                  color:'#6b7280', fontSize:'14px',
                }}>
                  <div style={{ fontSize:'40px', marginBottom:'12px' }}>🔍</div>
                  Nenhum anúncio encontrado.<br />
                  Tente outro termo ou cidade.
                </div>
              ) : (
                <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
                  {resultados.map((item, i) => (
                    <ResultCard key={item.id || i} item={item} delay={i * 100} />
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
